<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla del 3 - Tech</title>

    <!-- Tipografías -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="multiplicar.css">
    <script src="multiplicar.js"></script>
</head>
<body>

    <header>
        <button class="btn-probar" onclick="generarTablas();">
            GENERAR
        </button>
    </header>

    <main>
    <h1 class="titulo">Generador de tablas de multiplicar</h1>

        <p class="descripcion">
            Ingresa un número y presiona "GENERAR" para ver su tabla del 1 al 10.
        </p>

        <!-- NUEVO: Toggle sin JS -->

        <div class="input-container">
        <br></br>

        <input 
            type="number" 
            id="numero" 
            placeholder="Ej: 5"
            min="1"
        >
        <small class="help-text">
            <br></br>
            💡 Ejemplos: 2, 5, 10. Solo números positivos.
        </small>
        </div>

        <div class="tabla-container">
            <table id="tablas">
                <thead>
                    <tr>
                        <th>Operación</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>3 x 1</td><td>3</td></tr>
                    <tr><td>3 x 2</td><td>6</td></tr>
                    <tr><td>3 x 3</td><td>9</td></tr>
                    <tr><td>3 x 4</td><td>12</td></tr>
                    <tr><td>3 x 5</td><td>15</td></tr>
                    <tr><td>3 x 6</td><td>18</td></tr>
                    <tr><td>3 x 7</td><td>21</td></tr>
                    <tr><td>3 x 8</td><td>24</td></tr>
                    <tr><td>3 x 9</td><td>27</td></tr>
                    <tr><td>3 x 10</td><td>30</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <img src="Logo-Warmi.png" alt="Logo" class="logo">
        <p>Creado por Alexandra Ramírez</p>
    </footer>

</body>
</html>
